services:
  demo:
    build:
      context: ../..
      dockerfile: examples/demo/Dockerfile
    ports:
      - "3456:3456"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./data:/data
      - copilot-config:/root/.copilot
    restart: unless-stopped

volumes:
  copilot-config:
